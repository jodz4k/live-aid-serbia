<nav class="navbar">
  <div class="navbar-brand">Live Aid Serbia</div>
  <ul class="navbar-nav">
    <li><a routerLink="/home" routerLinkActive="active">Home</a></li>
    <li><a routerLink="/campaigns" routerLinkActive="active">Campaigns</a></li>
    <li><a routerLink="/artists" routerLinkActive="active">Artists</a></li>
    <li><a routerLink="/about" routerLinkActive="active">About</a></li>
  </ul>
  <div class="navbar-auth">
    <div *ngIf="!isLoggedIn" class="auth-section">
      <button (click)="showLogin()" class="login-btn">Login</button>
    </div>
    <div *ngIf="isLoggedIn" class="auth-section">
      <span class="user-greeting">Welcome, {{currentUser?.name}}</span>
      <button (click)="logout()" class="logout-btn">Logout</button>
    </div>
  </div>
</nav>
<app-login #loginComponent (loginSuccess)="onLoginSuccess()" (closeModal)="onLoginClose()"></app-login>
