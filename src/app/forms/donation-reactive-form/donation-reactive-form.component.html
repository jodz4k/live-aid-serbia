<form [formGroup]="donationForm" (ngSubmit)="onSubmit()">
  <div class="form-group">
    <label for="name">Name:</label>
    <input type="text" id="name" formControlName="name">
    <div *ngIf="donationForm.get('name')?.invalid && donationForm.get('name')?.touched" class="error">Name is required</div>
  </div>
  <div class="form-group">
    <label for="email">Email:</label>
    <input type="email" id="email" formControlName="email">
    <div *ngIf="donationForm.get('email')?.invalid && donationForm.get('email')?.touched" class="error">
      <span *ngIf="donationForm.get('email')?.errors?.required">Email is required</span>
      <span *ngIf="donationForm.get('email')?.errors?.email">Valid email is required</span>
    </div>
  </div>
  <div class="form-group">
    <label for="amount">Amount (min 5):</label>
    <input type="number" id="amount" formControlName="amount">
    <div *ngIf="donationForm.get('amount')?.invalid && donationForm.get('amount')?.touched" class="error">
      <span *ngIf="donationForm.get('amount')?.errors?.required">Amount is required</span>
      <span *ngIf="donationForm.get('amount')?.errors?.min">Amount must be at least 5</span>
    </div>
  </div>
  <div class="form-group">
    <label for="message">Message:</label>
    <textarea id="message" formControlName="message"></textarea>
  </div>
  <button type="submit" [disabled]="donationForm.invalid">Donate</button>
</form>
