<form #f="ngForm" (ngSubmit)="onSubmit()" class="donation-form">
  <h3>Make a Donation</h3>

  <div class="form-group">
    <label for="name">Full Name:</label>
    <input type="text" id="name" name="name" ngModel required minlength="2" #name="ngModel"
           [class.error]="name.invalid && name.touched" placeholder="Enter your full name">
    <div *ngIf="name.invalid && name.touched" class="error-message">
      <span *ngIf="name.errors?.required">Name is required</span>
      <span *ngIf="name.errors?.minlength">Name must be at least 2 characters</span>
    </div>
  </div>

  <div class="form-group">
    <label for="email">Email Address:</label>
    <input type="email" id="email" name="email" ngModel required email #email="ngModel"
           [class.error]="email.invalid && email.touched" placeholder="your@email.com">
    <div *ngIf="email.invalid && email.touched" class="error-message">
      <span *ngIf="email.errors?.required">Email is required</span>
      <span *ngIf="email.errors?.email">Please enter a valid email address</span>
    </div>
  </div>

  <div class="form-group">
    <label for="amount">Donation Amount ($):</label>
    <input type="number" id="amount" name="amount" ngModel required min="1" max="10000" step="0.01" #amount="ngModel"
           [class.error]="amount.invalid && amount.touched" placeholder="0.00">
    <div *ngIf="amount.invalid && amount.touched" class="error-message">
      <span *ngIf="amount.errors?.required">Amount is required</span>
      <span *ngIf="amount.errors?.min">Amount must be at least $1</span>
      <span *ngIf="amount.errors?.max">Amount cannot exceed $10,000</span>
    </div>
  </div>

  <div class="form-group">
    <label for="message">Message (Optional):</label>
    <textarea id="message" name="message" ngModel rows="3"
              placeholder="Leave a message of support..."></textarea>
  </div>

  <div class="form-group checkbox-group">
    <label class="checkbox-label">
      <input type="checkbox" name="anonymous" ngModel #anonymous="ngModel">
      Make this donation anonymous
    </label>
  </div>

  <button type="submit" [disabled]="f.invalid || isSubmitting" class="donate-btn">
    <span *ngIf="isSubmitting" class="loading-spinner"></span>
    {{isSubmitting ? 'Processing...' : 'Complete Donation'}}
  </button>

  <div *ngIf="submitSuccess" class="success-message">
    ✅ Thank you for your generous donation!
  </div>
</form>
